const { useState, useEffect, useRef, useMemo } = React;
dayjs.locale('ko');
dayjs.extend(window.dayjs_plugin_isToday);

// ── localStorage ──────────────────────────────────────────────────
const ls = {
  get:(k,d)=>{ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } },
  set:(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} },
};

// ── Constants ─────────────────────────────────────────────────────
const COLORS=[
  {bg:'bg-blue-100',  border:'border-blue-200',  text:'text-blue-700',  solid:'bg-blue-500'  },
  {bg:'bg-emerald-100',border:'border-emerald-200',text:'text-emerald-700',solid:'bg-emerald-500'},
  {bg:'bg-violet-100',border:'border-violet-200', text:'text-violet-700',solid:'bg-violet-500' },
  {bg:'bg-amber-100', border:'border-amber-200',  text:'text-amber-700', solid:'bg-amber-500'  },
  {bg:'bg-rose-100',  border:'border-rose-200',   text:'text-rose-700',  solid:'bg-rose-500'   },
  {bg:'bg-cyan-100',  border:'border-cyan-200',   text:'text-cyan-700',  solid:'bg-cyan-500'   },
];
const CLS_SOLID=['bg-indigo-500','bg-emerald-500','bg-amber-500','bg-rose-500','bg-violet-500','bg-cyan-500'];
const T_EMOJIS=['👩‍🏫','👨‍🏫','🧑‍🏫','👩‍💼','👨‍💼','🎓'];
const STAT_CFG={
  '미시작':{bg:'bg-slate-100',  text:'text-slate-500'  },
  '진행중':{bg:'bg-amber-100',  text:'text-amber-700'  },
  '완료':  {bg:'bg-emerald-100',text:'text-emerald-700'},
};
const QUICK_MSGS=[
  '오늘 수업 잘 마쳤습니다 😊','숙제 확인 부탁드립니다!',
  '다음 수업은 정상 진행됩니다','수업 일정 변경이 필요합니다',
  '오늘 수업 결석 처리되었습니다','수업료 정산 부탁드립니다',
];

// ── Base Components ───────────────────────────────────────────────
const Icon=({name,size=18,className=''})=>{
  useEffect(()=>{ try{lucide.createIcons();}catch{} },[name]);
  return <i data-lucide={name} style={{width:size,height:size}} className={`flex-shrink-0 ${className}`}/>;
};

const Av=({name,col,sz='md'})=>{
  const s={sm:'w-8 h-8 text-sm',md:'w-10 h-10 text-base',lg:'w-12 h-12 text-lg'}[sz];
  return <div className={`${s} rounded-2xl ${col?.bg||'bg-slate-100'} ${col?.text||'text-slate-600'} flex items-center justify-center font-bold flex-shrink-0`}>{name?.[0]||'?'}</div>;
};

const Modal=({open,onClose,title,children,footer,wide})=>{
  if(!open) return null;
  return(
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/50 backdrop-blur-sm"
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className={`bg-white rounded-t-3xl sm:rounded-3xl w-full ${wide?'max-w-lg':'max-w-md'} max-h-[90vh] flex flex-col shadow-2xl`}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 flex-shrink-0">
          <h3 className="text-lg font-bold">{title}</h3>
          <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 transition-colors"><Icon name="x" size={15}/></button>
        </div>
        <div className="overflow-y-auto p-6 flex-1 space-y-4">{children}</div>
        {footer&&<div className="px-6 py-4 border-t border-slate-100 flex-shrink-0">{footer}</div>}
      </div>
    </div>
  );
};

const Fld=({label,children})=>(
  <div><p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">{label}</p>{children}</div>
);

// ── Korean IME-safe inputs ────────────────────────────────────────
// Root cause: React's `value` prop overwrites the DOM on every render,
// which destroys the browser's IME composition state mid-typing.
// Fix: use `defaultValue` (uncontrolled) so React never touches the DOM value.
// Parent value changes are applied imperatively via ref, only when not composing.

const Inp=({value='',onChange,...props})=>{
  const ref=useRef(null);
  const composing=useRef(false);
  // Sync parent-driven value changes to DOM (e.g. modal opens with edit data)
  useEffect(()=>{
    if(ref.current&&!composing.current&&ref.current.value!==(value??''))
      ref.current.value=value??'';
  },[value]);
  return(
    <input {...props} ref={ref} defaultValue={value}
      onChange={e=>{ if(!composing.current) onChange?.(e); }}
      onCompositionStart={()=>{ composing.current=true; }}
      onCompositionEnd={e=>{ composing.current=false; onChange?.(e); }}
      className={`w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-sm text-slate-900 placeholder:text-slate-400 transition-all ${props.className||''}`}
    />
  );
};

const Sel=(props)=>(
  <select {...props} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-sm text-slate-900 transition-all"/>
);

const Txta=({value='',onChange,...props})=>{
  const ref=useRef(null);
  const composing=useRef(false);
  useEffect(()=>{
    if(ref.current&&!composing.current&&ref.current.value!==(value??''))
      ref.current.value=value??'';
  },[value]);
  return(
    <textarea {...props} ref={ref} defaultValue={value}
      onChange={e=>{ if(!composing.current) onChange?.(e); }}
      onCompositionStart={()=>{ composing.current=true; }}
      onCompositionEnd={e=>{ composing.current=false; onChange?.(e); }}
      className="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-sm text-slate-900 resize-none transition-all"
    />
  );
};

const PriBtn=({children,disabled,className='',...p})=>(
  <button {...p} disabled={disabled} className={`bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2 transition-all active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed ${className}`}>{children}</button>
);

// ── Share View (cross-device: data encoded in URL) ────────────────
function ShareView({data}){
  if(!data) return(
    <div className="min-h-screen flex items-center justify-center text-slate-400">
      <div className="text-center"><p className="text-5xl mb-4">😕</p><p className="font-semibold">링크가 올바르지 않습니다</p><p className="text-sm mt-2">공유 링크를 다시 확인해 주세요</p></div>
    </div>
  );
  const {s:student,h:hws=[],t:teacherName}=data;
  const col=COLORS[student.colorIdx||0];
  const done=hws.filter(h=>h.completed).length;
  return(
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-100 p-6 flex items-start justify-center pt-16">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">📝</div>
          <h1 className="text-2xl font-bold">{student.name} 학생 숙제</h1>
          <p className="text-slate-500 text-sm mt-1">{teacherName} 선생님 · {student.subject}</p>
        </div>
        <div className="bg-white rounded-3xl shadow-sm p-6 mb-4">
          <div className="flex justify-between text-sm font-semibold mb-2">
            <span className="text-slate-600">{done}/{hws.length} 완료</span>
            <span className="text-indigo-600 font-bold">{hws.length?Math.round(done/hws.length*100):0}%</span>
          </div>
          <div className="h-2 bg-slate-100 rounded-full overflow-hidden mb-5">
            <div className="h-full bg-indigo-500 rounded-full" style={{width:`${hws.length?done/hws.length*100:0}%`}}/>
          </div>
          {hws.length===0
            ?<p className="text-center text-slate-400 py-6">숙제가 없어요 🎉</p>
            :hws.map(hw=>(
              <div key={hw.id} className={`flex items-start gap-3 p-3 rounded-xl mb-2 last:mb-0 ${hw.completed?'bg-emerald-50':'bg-slate-50'}`}>
                <div className={`w-5 h-5 rounded-full border-2 mt-0.5 flex items-center justify-center flex-shrink-0 ${hw.completed?'bg-emerald-500 border-emerald-500':'border-slate-300'}`}>
                  {hw.completed&&<Icon name="check" size={11} className="text-white"/>}
                </div>
                <span className={`text-sm font-medium ${hw.completed?'line-through text-slate-400':'text-slate-700'}`}>{hw.task}</span>
              </div>
            ))
          }
        </div>
        <p className="text-center text-xs text-slate-400">TutorMate Pro · {dayjs().format('YYYY년 MM월 DD일')}</p>
      </div>
    </div>
  );
}

// ── App Router ────────────────────────────────────────────────────
function App(){
  const shareData=useMemo(()=>{
    const m=window.location.hash.match(/#share\/(.+)/);
    if(!m) return null;
    try{ return JSON.parse(decodeURIComponent(atob(m[1]))); }catch{ return null; }
  },[]);
  if(shareData) return <ShareView data={shareData}/>;
  return <MainApp/>;
}

// ── Main App ──────────────────────────────────────────────────────
function MainApp(){
  const DEF_TEACHER={id:'t1',name:'선생님',emoji:'👩‍🏫'};
  const initTid=()=>ls.get('tm_tid','t1');

  // ── Data state ───────────────────────────────────────────────
  const [teachers,setTeachers]=useState(()=>ls.get('tm_teachers',[DEF_TEACHER]));
  const [tid,setTid]          =useState(initTid);
  const [students,setStudents]=useState(()=>ls.get(`tm_${initTid()}_students`,[]));
  const [classes,setClasses]  =useState(()=>ls.get(`tm_${initTid()}_classes`,[]));
  const [lessons,setLessons]  =useState(()=>ls.get(`tm_${initTid()}_lessons`,[]));
  const [homeworks,setHomeworks]=useState(()=>ls.get(`tm_${initTid()}_homeworks`,[]));
  const [progress,setProgress]=useState(()=>ls.get(`tm_${initTid()}_progress`,[]));
  const [messages,setMessages]=useState(()=>ls.get(`tm_${initTid()}_messages`,{}));

  // ── UI state ─────────────────────────────────────────────────
  const [tab,setTab]       =useState('dashboard');
  const [month,setMonth]   =useState(dayjs());
  const [selDate,setSelDate]=useState(dayjs());
  const [msgSid,setMsgSid] =useState(null);
  const [tMenu,setTMenu]   =useState(false);
  const [toast,setToast]   =useState(null);
  const tMenuRef =useRef(null);
  const toastTimer=useRef(null);

  // ── Modal state ──────────────────────────────────────────────
  const [modal,setModal]       =useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [f,setF]               =useState({});
  const upd=patch=>setF(p=>({...p,...patch}));

  // ── Auto-save on state change ────────────────────────────────
  useEffect(()=>ls.set('tm_teachers',teachers),[teachers]);
  useEffect(()=>ls.set('tm_tid',tid),[tid]);
  useEffect(()=>ls.set(`tm_${tid}_students`,students),[students,tid]);
  useEffect(()=>ls.set(`tm_${tid}_classes`,classes),[classes,tid]);
  useEffect(()=>ls.set(`tm_${tid}_lessons`,lessons),[lessons,tid]);
  useEffect(()=>ls.set(`tm_${tid}_homeworks`,homeworks),[homeworks,tid]);
  useEffect(()=>ls.set(`tm_${tid}_progress`,progress),[progress,tid]);
  useEffect(()=>ls.set(`tm_${tid}_messages`,messages),[messages,tid]);

  // ── Reload data when teacher switches ────────────────────────
  useEffect(()=>{
    setStudents(ls.get(`tm_${tid}_students`,[]));
    setClasses(ls.get(`tm_${tid}_classes`,[]));
    setLessons(ls.get(`tm_${tid}_lessons`,[]));
    setHomeworks(ls.get(`tm_${tid}_homeworks`,[]));
    setProgress(ls.get(`tm_${tid}_progress`,[]));
    setMessages(ls.get(`tm_${tid}_messages`,{}));
    setMsgSid(null);
  },[tid]);

  // ── Close teacher menu on outside click ──────────────────────
  useEffect(()=>{
    if(!tMenu) return;
    const h=e=>{ if(!tMenuRef.current?.contains(e.target)) setTMenu(false); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[tMenu]);

  // ── Toast helper ─────────────────────────────────────────────
  const showToast=(msg,type='success')=>{
    setToast({msg,type});
    clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(null),2200);
  };

  // ── Manual save (explicit localStorage flush) ─────────────────
  const saveAll=()=>{
    ls.set('tm_teachers',teachers);
    ls.set('tm_tid',tid);
    ls.set(`tm_${tid}_students`,students);
    ls.set(`tm_${tid}_classes`,classes);
    ls.set(`tm_${tid}_lessons`,lessons);
    ls.set(`tm_${tid}_homeworks`,homeworks);
    ls.set(`tm_${tid}_progress`,progress);
    ls.set(`tm_${tid}_messages`,messages);
    showToast('저장 완료! ✓');
  };

  // ── Helpers ──────────────────────────────────────────────────
  const curTeacher=teachers.find(t=>t.id===tid)||DEF_TEACHER;
  const getSt=id=>students.find(s=>s.id===id);
  const getCl=id=>classes.find(c=>c.id===id);
  const col=st=>COLORS[st?.colorIdx??0];
  const lessonsOn=d=>lessons.filter(l=>l.date===d.format('YYYY-MM-DD'));

  // Share link: encode student+homeworks into URL → works on any device
  const shareLink=sid=>{
    const st=getSt(sid); if(!st) return '';
    const payload={s:{name:st.name,subject:st.subject,colorIdx:st.colorIdx},h:homeworks.filter(h=>h.studentId===sid),t:curTeacher.name};
    return `${window.location.href.split('#')[0]}#share/${btoa(encodeURIComponent(JSON.stringify(payload)))}`;
  };

  const openModal=(name,target=null,init={})=>{ setModal(name); setEditTarget(target); setF(init); };
  const closeModal=()=>{ setModal(null); setEditTarget(null); setF({}); };

  // ── Teachers ─────────────────────────────────────────────────
  const addTeacher=()=>{
    if(!f.name?.trim()) return;
    const t={id:`t${Date.now()}`,name:f.name.trim(),emoji:f.emoji||'👩‍🏫'};
    setTeachers(p=>[...p,t]); setTid(t.id); closeModal();
  };
  const delTeacher=id=>{
    if(teachers.length===1){ alert('마지막 프로필은 삭제할 수 없습니다.'); return; }
    if(!confirm('이 프로필을 삭제하시겠습니까?')) return;
    const next=teachers.filter(t=>t.id!==id);
    setTeachers(next); if(tid===id) setTid(next[0].id);
  };

  // ── Students ─────────────────────────────────────────────────
  const addStudent=()=>{
    if(!f.name?.trim()||!f.subject?.trim()) return;
    const s={id:`s${Date.now()}`,name:f.name.trim(),subject:f.subject.trim(),classId:f.classId||null,colorIdx:students.length%COLORS.length};
    setStudents(p=>[...p,s]); closeModal();
  };
  const editStudent=()=>{
    if(!f.name?.trim()||!f.subject?.trim()) return;
    setStudents(p=>p.map(s=>s.id===editTarget.id?{...s,name:f.name.trim(),subject:f.subject.trim(),classId:f.classId||null}:s));
    closeModal();
  };
  const delStudent=id=>{
    if(!confirm('학생을 삭제하시겠습니까?')) return;
    setStudents(p=>p.filter(s=>s.id!==id));
    setLessons(p=>p.filter(l=>l.studentId!==id));
    setHomeworks(p=>p.filter(h=>h.studentId!==id));
    setProgress(p=>p.filter(x=>x.studentId!==id));
    setMessages(p=>{ const n={...p}; delete n[id]; return n; });
  };

  // ── Classes ──────────────────────────────────────────────────
  const addClass=()=>{
    if(!f.name?.trim()) return;
    const c={id:`c${Date.now()}`,name:f.name.trim(),colorIdx:classes.length%CLS_SOLID.length};
    setClasses(p=>[...p,c]); closeModal();
  };
  const delClass=id=>{
    if(!confirm('클래스를 삭제하시겠습니까?')) return;
    setClasses(p=>p.filter(c=>c.id!==id));
    setStudents(p=>p.map(s=>s.classId===id?{...s,classId:null}:s));
  };

  // ── Lessons ──────────────────────────────────────────────────
  const addLesson=()=>{
    if(!f.studentId){ alert('학생을 선택해주세요.'); return; }
    const prev=lessons.filter(l=>l.studentId===f.studentId);
    const l={id:`l${Date.now()}`,studentId:f.studentId,date:f.date||selDate.format('YYYY-MM-DD'),
      time:f.time||'16:00 - 17:30',sessionCount:f.sessionCount?Number(f.sessionCount):prev.length+1,memo:f.memo||'',status:'scheduled'};
    setLessons(p=>[...p,l]); closeModal();
  };
  const editLesson=()=>{
    setLessons(p=>p.map(l=>l.id===editTarget.id?{...l,...f,sessionCount:Number(f.sessionCount)||l.sessionCount}:l));
    closeModal();
  };
  const doneLesson=id=>setLessons(p=>p.map(l=>l.id===id?{...l,status:'completed'}:l));
  const delLesson=id=>{ if(confirm('수업을 삭제하시겠습니까?')) setLessons(p=>p.filter(l=>l.id!==id)); };

  // ── Homework ─────────────────────────────────────────────────
  const addHomework=()=>{
    if(!f.studentId||!f.task?.trim()) return;
    const h={id:`h${Date.now()}`,studentId:f.studentId,task:f.task.trim(),completed:false,dueDate:f.dueDate||dayjs().format('YYYY-MM-DD')};
    setHomeworks(p=>[...p,h]); closeModal();
  };
  const toggleHW=id=>setHomeworks(p=>p.map(h=>h.id===id?{...h,completed:!h.completed}:h));
  const delHW=id=>setHomeworks(p=>p.filter(h=>h.id!==id));

  // ── Progress ─────────────────────────────────────────────────
  const addProgress=()=>{
    if(!f.studentId||!f.unit?.trim()) return;
    const x={id:`p${Date.now()}`,studentId:f.studentId,unit:f.unit.trim(),status:f.status||'미시작',memo:f.memo||''};
    setProgress(p=>[...p,x]); closeModal();
  };
  const setProgStatus=(id,status)=>setProgress(p=>p.map(x=>x.id===id?{...x,status}:x));
  const delProgress=id=>{ if(confirm('삭제하시겠습니까?')) setProgress(p=>p.filter(x=>x.id!==id)); };

  // ── Messages ─────────────────────────────────────────────────
  const sendMsg=(sid,text)=>{
    if(!text.trim()) return;
    const now=dayjs();
    const m={id:`m${Date.now()}`,text:text.trim(),from:'tutor',time:now.format('HH:mm'),date:now.format('YYYY-MM-DD')};
    setMessages(p=>({...p,[sid]:[...(p[sid]||[]),m]}));
  };
  const delMsg=(sid,mid)=>setMessages(p=>({...p,[sid]:(p[sid]||[]).filter(m=>m.id!==mid)}));

  // ── Nav tabs ─────────────────────────────────────────────────
  const TABS=[
    {id:'dashboard',icon:'layout-dashboard',label:'대시보드'},
    {id:'calendar', icon:'calendar',        label:'캘린더'  },
    {id:'students', icon:'users',           label:'학생/클래스'},
    {id:'homework', icon:'check-square',    label:'숙제'    },
    {id:'progress', icon:'bar-chart-2',     label:'진도표'  },
    {id:'messages', icon:'message-circle',  label:'메시지'  },
  ];

  // ═══════════════════════════ HEADER ══════════════════════════
  const Header=()=>(
    <header className="bg-white border-b border-slate-200 sticky top-0 z-30">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
        <div className="flex items-center gap-2.5 flex-shrink-0">
          <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-sm">
            <Icon name="book-open" size={17} className="text-white"/>
          </div>
          <div className="hidden sm:block">
            <p className="text-base font-bold leading-none">TutorMate</p>
            <p className="text-[9px] text-slate-400 font-bold uppercase tracking-wider leading-none mt-0.5">Pro</p>
          </div>
        </div>

        <nav className="hidden lg:flex items-center bg-slate-100 p-1 rounded-xl gap-0.5 flex-1 max-w-2xl">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all whitespace-nowrap flex-1 justify-center ${tab===t.id?'bg-white text-indigo-600 shadow-sm':'text-slate-500 hover:text-slate-700'}`}>
              <Icon name={t.icon} size={13}/>{t.label}
            </button>
          ))}
        </nav>

        <div className="flex items-center gap-2 flex-shrink-0">
          <button onClick={saveAll}
            className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs font-bold transition-all border border-emerald-200">
            <Icon name="save" size={13}/>

  // ═══════════════════════════ DASHBOARD ═══════════════════════

    const todayLessons=lessons.filter(l=>l.date===todayStr);

    return(
      <div className="space-y-6">
        <div>
          <h1 className="text-2xl font-bold">{today.format('M월 D일')} <span className="text-slate-400 font-normal text-lg">{['일','월','화','수','목','금','토'][today.day()]}요일</span></h1>
          <p className="text-slate-500 text-sm mt-0.5">{curTeacher.emoji} {curTeacher.name} 선생님</p>
        </div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          {[
            {icon:'users',     label:'등록 학생',  val:students.length,     color:'text-blue-600',  bg:'bg-blue-50'  },
            {icon:'calendar',  label:'오늘 수업',  val:todayLessons.length, color:'text-indigo-600',bg:'bg-indigo-50'},
            {icon:'clock',     label:'미완료 숙제',val:pendingHW.length,    color:'text-amber-600', bg:'bg-amber-50' },

          ].map(s=>(
            <div key={s.label} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
              <div className={`w-9 h-9 ${s.bg} rounded-xl flex items-center justify-center mb-3`}>
                <Icon name={s.icon} size={17} className={s.color}/>
              </div>
              <p className="text-2xl font-bold">{s.val}</p>
              <p className="text-xs text-slate-500 font-medium mt-0.5">{s.label}</p>

        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

            {dueToday.map(hw=>{
              const st=getSt(hw.studentId);
              return(
                <div key={hw.id} className="flex items-center gap-2.5 mb-2 last:mb-0">
                  <Av name={st?.name} col={col(st)} sz="sm"/>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-medium text-slate-700 truncate">{hw.task}</p>
                    <p className="text-xs text-slate-500">{st?.name}</p>
                  </div>
                  <button onClick={()=>toggleHW(hw.id)} className="px-2.5 py-1 bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold rounded-lg transition-all">완료</button>

  // ═══════════════════════════ CALENDAR ════════════════════════
  const Calendar=()=>{
    const startDay=month.startOf('month').day();
    const daysInMonth=month.daysInMonth();
    const days=[];
    for(let i=0;i<startDay;i++) days.push(null);
    for(let d=1;d<=daysInMonth;d++) days.push(month.date(d));
    const DOW=['일','월','화','수','목','금','토'];
    const selLessons=lessonsOn(selDate);
    return(
      <div className="space-y-5">
        <div className="flex items-center justify-between">
          <h2 className="text-xl font-bold">{month.format('YYYY년 M월')}</h2>
          <div className="flex items-center gap-2">
            <button onClick={()=>setMonth(m=>m.subtract(1,'month'))} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 transition-all"><Icon name="chevron-left" size={17}/></button>
            <button onClick={()=>setMonth(dayjs())} className="px-3 py-1.5 text-xs font-bold text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-all">오늘</button>
            <button onClick={()=>setMonth(m=>m.add(1,'month'))} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 transition-all"><Icon name="chevron-right" size={17}/></button>
          </div>
        </div>

        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div className="grid grid-cols-7">
            {DOW.map((d,i)=>(
              <div key={d} className={`text-center py-3 text-xs font-bold ${i===0?'text-rose-400':i===6?'text-blue-400':'text-slate-400'}`}>{d}</div>
            ))}
          </div>
          <div className="grid grid-cols-7 border-t border-slate-100">
            {days.map((d,i)=>{
              if(!d) return <div key={`e${i}`} className="aspect-square border-b border-r border-slate-50 last:border-r-0"/>;
              const ls2=lessonsOn(d);
              const isToday=d.isToday();
              const isSel=d.format('YYYY-MM-DD')===selDate.format('YYYY-MM-DD');
              const dow=i%7;
              return(
                <button key={d.format('YYYY-MM-DD')} onClick={()=>setSelDate(d)}
                  className={`aspect-square border-b border-r border-slate-50 flex flex-col items-center justify-center gap-0.5 transition-all hover:bg-slate-50 ${isSel?'bg-indigo-50':''}`}>
                  <span className={`text-sm font-semibold w-7 h-7 flex items-center justify-center rounded-full ${isToday?'bg-indigo-600 text-white':isSel?'text-indigo-600':dow===0?'text-rose-400':dow===6?'text-blue-400':'text-slate-700'}`}>{d.date()}</span>
                  {ls2.length>0&&(
                    <div className="flex gap-0.5">
                      {ls2.slice(0,3).map(l=><div key={l.id} className={`w-1.5 h-1.5 rounded-full ${col(getSt(l.studentId))?.solid||'bg-slate-400'}`}/>)}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </div>

        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
            <p className="font-bold">{selDate.format('M월 D일')} 수업</p>
            <button onClick={()=>openModal('addLesson',null,{date:selDate.format('YYYY-MM-DD')})}
              className="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition-all">
              <Icon name="plus" size={13}/>수업 추가
            </button>
          </div>
          {selLessons.length===0
            ?<div className="px-5 py-8 text-center text-slate-400 text-sm">이 날 수업이 없습니다</div>
            :selLessons.map(l=>{
              const st=getSt(l.studentId); const c=col(st);
              return(
                <div key={l.id} className="px-5 py-3.5 flex items-center gap-3 border-b border-slate-50 last:border-0">
                  <Av name={st?.name} col={c} sz="sm"/>
                  <div className="flex-1 min-w-0">
                    <p className="font-semibold text-sm">{st?.name||'(삭제된 학생)'} <span className="text-slate-400 font-normal">· {l.sessionCount}회차</span></p>
                    <p className="text-xs text-slate-500">{l.time}{l.memo&&` · ${l.memo}`}</p>
                  </div>
                  <div className="flex items-center gap-1.5">
                    {l.status!=='completed'&&<button onClick={()=>doneLesson(l.id)} className="px-2.5 py-1 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 text-xs font-bold rounded-lg transition-all">완료</button>}
                    <button onClick={()=>openModal('editLesson',l,{...l,sessionCount:String(l.sessionCount)})} className="p-1.5 hover:bg-slate-100 text-slate-400 rounded-lg transition-all"><Icon name="pencil" size={13}/></button>
                    <button onClick={()=>delLesson(l.id)} className="p-1.5 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-lg transition-all"><Icon name="trash-2" size={13}/></button>
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    );
  };

  // ═══════════════════════════ STUDENTS ════════════════════════
  const Students=()=>{
    const [selCls,setSelCls]=useState('all');
    const filtered=selCls==='all'?students:students.filter(s=>s.classId===selCls);
    return(
      <div className="space-y-5">
        <div className="flex items-center justify-between">
          <h2 className="text-xl font-bold">학생 / 클래스</h2>
          <div className="flex gap-2">
            <button onClick={()=>openModal('addClass')} className="flex items-center gap-1.5 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-xl transition-all">
              <Icon name="folder-plus" size={13}/>클래스
            </button>
            <button onClick={()=>openModal('addStudent')} className="flex items-center gap-1.5 px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition-all">
              <Icon name="user-plus" size={13}/>학생 추가
            </button>
          </div>
        </div>
        {classes.length>0&&(
          <div className="flex gap-2 flex-wrap">
            <button onClick={()=>setSelCls('all')}
              className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all ${selCls==='all'?'bg-indigo-600 text-white':'bg-white text-slate-500 border border-slate-200 hover:border-indigo-300'}`}>전체</button>

                  {c.name}
                </button>
                <button onClick={()=>delClass(c.id)} className="w-5 h-5 flex items-center justify-center rounded-full hover:bg-red-50 text-slate-300 hover:text-red-400 transition-all"><Icon name="x" size={11}/></button>
              </div>
            ))}
          </div>
        )}
        {filtered.length===0
          ?<div className="bg-white rounded-2xl border border-slate-100 py-12 text-center text-slate-400 text-sm">학생이 없습니다. 학생을 추가해보세요!</div>

                    <Av name={st.name} col={c}/>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <p className="font-bold text-slate-800 truncate">{st.name}</p>
                        {cl&&<span className={`text-[10px] px-1.5 py-0.5 rounded-full text-white font-bold ${CLS_SOLID[cl.colorIdx||0]}`}>{cl.name}</span>}
                      </div>
                      <p className="text-xs text-slate-500 mt-0.5">{st.subject}</p>
                    </div>
                  </div>
                  <div className="flex gap-3 text-xs text-slate-500 mb-4">
                    <span className="flex items-center gap-1"><Icon name="book" size={11}/>{stLessons.length}회 수업</span>
                    <span className="flex items-center gap-1"><Icon name="check-square" size={11}/>{doneHW}/{stHW.length} 숙제</span>
                  </div>
                  <div className="flex gap-1.5">
                    <button onClick={()=>openModal('editStudent',st,{name:st.name,subject:st.subject,classId:st.classId||''})}

                      <Icon name="pencil" size={11}/>수정
                    </button>
                    <button onClick={()=>openModal('shareHW',st)}
                      className="flex-1 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-xs font-semibold rounded-lg transition-all flex items-center justify-center gap-1">
                      <Icon name="share-2" size={11}/>공유
                    </button>
                    <button onClick={()=>delStudent(st.id)} className="py-1.5 px-2.5 hover:bg-red-50 text-slate-300 hover:text-red-400 text-xs rounded-lg transition-all">

  // ═══════════════════════════ HOMEWORK ════════════════════════
  const Homework=()=>{
    const [selSid,setSelSid]=useState('all');
    const [statusF,setStatusF]=useState('all');
    const filtered=homeworks
      .filter(h=>selSid==='all'||h.studentId===selSid)
      .filter(h=>statusF==='all'||(statusF==='done'?h.completed:!h.completed));
    const doneCount=homeworks.filter(h=>h.completed).length;
    return(
      <div className="space-y-5">
        <div className="flex items-center justify-between">
          <div>
            <h2 className="text-xl font-bold">숙제 관리</h2>
            <p className="text-sm text-slate-500 mt-0.5">{doneCount}/{homeworks.length} 완료</p>
          </div>
          <button onClick={()=>openModal('addHomework')} className="flex items-center gap-1.5 px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition-all">
            <Icon name="plus" size={13}/>숙제 추가
          </button>
        </div>
        {students.length>0&&(
          <div className="flex gap-2 overflow-x-auto pb-1">
            <button onClick={()=>setSelSid('all')}
              className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap flex-shrink-0 transition-all ${selSid==='all'?'bg-indigo-600 text-white':'bg-white text-slate-500 border border-slate-200'}`}>전체</button>
            {students.map(st=>(
              <button key={st.id} onClick={()=>setSelSid(st.id)}
                className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap flex-shrink-0 transition-all ${selSid===st.id?`${col(st).solid} text-white`:'bg-white text-slate-500 border border-slate-200'}`}>{st.name}</button>
            ))}
          </div>
        )}
        <div className="flex gap-1.5">
          {[['all','전체'],['todo','미완료'],['done','완료']].map(([v,l])=>(
            <button key={v} onClick={()=>setStatusF(v)}
              className={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all ${statusF===v?'bg-slate-800 text-white':'bg-white text-slate-500 border border-slate-200 hover:border-slate-300'}`}>{l}</button>
          ))}
        </div>
        <div className="space-y-2">
          {filtered.length===0
            ?<div className="bg-white rounded-2xl border border-slate-100 py-12 text-center text-slate-400 text-sm">숙제가 없습니다</div>
            :filtered.map(hw=>{
              const st=getSt(hw.studentId); const c=col(st);
              const due=dayjs(hw.dueDate);
              const overdue=!hw.completed&&due.isBefore(dayjs(),'day');
              return(
                <div key={hw.id} className={`bg-white rounded-2xl border shadow-sm flex items-center gap-4 px-4 py-3.5 transition-all ${hw.completed?'opacity-60 border-slate-100':'border-slate-100'}`}>
                  <button onClick={()=>toggleHW(hw.id)}
                    className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all ${hw.completed?'bg-emerald-500 border-emerald-500':'border-slate-300 hover:border-indigo-400'}`}>
                    {hw.completed&&<Icon name="check" size={12} className="text-white"/>}
                  </button>
                  <Av name={st?.name} col={c} sz="sm"/>
                  <div className="flex-1 min-w-0">
                    <p className={`font-semibold text-sm ${hw.completed?'line-through text-slate-400':'text-slate-800'}`}>{hw.task}</p>
                    <p className={`text-xs mt-0.5 ${overdue?'text-rose-500 font-semibold':hw.completed?'text-slate-400':'text-slate-500'}`}>
                      {st?.name} · 기한 {due.format('M/D')}{overdue?' (기한 초과!)':''}
                    </p>
                  </div>
                  <button onClick={()=>delHW(hw.id)} className="p-1.5 hover:bg-red-50 text-slate-300 hover:text-red-400 rounded-lg transition-all flex-shrink-0">
                    <Icon name="trash-2" size={13}/>
                  </button>
                </div>
              );
            })
          }
        </div>
      </div>
    );
  };

  // ═══════════════════════════ PROGRESS ════════════════════════
  const Progress=()=>{
    const [selSid,setSelSid]=useState(students[0]?.id||null);
    useEffect(()=>{ if(!selSid&&students[0]) setSelSid(students[0].id); },[students]);
    const stProg=progress.filter(x=>x.studentId===selSid);
    const done=stProg.filter(x=>x.status==='완료').length;
    const st=getSt(selSid);
    return(
      <div className="space-y-5">
        <div className="flex items-center justify-between">
          <h2 className="text-xl font-bold">진도표</h2>
          <button onClick={()=>openModal('addProgress',null,{studentId:selSid||''})} className="flex items-center gap-1.5 px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition-all">
            <Icon name="plus" size={13}/>진도 추가
          </button>
        </div>
        <div className="flex gap-2 overflow-x-auto pb-1">
          {students.map(s=>(
            <button key={s.id} onClick={()=>setSelSid(s.id)}
              className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap flex-shrink-0 transition-all ${selSid===s.id?`${col(s).solid} text-white`:'bg-white text-slate-500 border border-slate-200'}`}>{s.name}</button>
          ))}
        </div>
        {st&&stProg.length>0&&(
          <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
            <div className="flex items-center justify-between mb-2">
              <p className="font-bold text-sm">{st.name} 진도 현황</p>
              <span className="text-sm font-bold text-indigo-600">{stProg.length?Math.round(done/stProg.length*100):0}%</span>
            </div>
            <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
              <div className="h-full bg-indigo-500 rounded-full transition-all" style={{width:`${stProg.length?done/stProg.length*100:0}%`}}/>
            </div>
            <div className="flex gap-4 mt-3 text-xs text-slate-500">
              {['미시작','진행중','완료'].map(s2=>(
                <span key={s2}>{s2} {stProg.filter(x=>x.status===s2).length}</span>
              ))}
            </div>
          </div>
        )}
        <div className="space-y-2">
          {!selSid
            ?<div className="bg-white rounded-2xl border border-slate-100 py-12 text-center text-slate-400 text-sm">학생을 선택해주세요</div>
            :stProg.length===0
              ?<div className="bg-white rounded-2xl border border-slate-100 py-12 text-center text-slate-400 text-sm">진도 항목이 없습니다</div>
              :stProg.map(x=>(
                <div key={x.id} className="bg-white rounded-2xl border border-slate-100 shadow-sm px-5 py-4">
                  <div className="flex items-center justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-sm text-slate-800 truncate">{x.unit}</p>
                      {x.memo&&<p className="text-xs text-slate-500 mt-0.5">{x.memo}</p>}
                    </div>
                    <div className="flex items-center gap-1.5 flex-shrink-0">
                      {['미시작','진행중','완료'].map(s2=>(
                        <button key={s2} onClick={()=>setProgStatus(x.id,s2)}
                          className={`px-2.5 py-1 rounded-lg text-xs font-bold transition-all ${x.status===s2?`${STAT_CFG[s2].bg} ${STAT_CFG[s2].text}`:'bg-slate-50 text-slate-400 hover:bg-slate-100'}`}>{s2}</button>
                      ))}
                      <button onClick={()=>delProgress(x.id)} className="p-1.5 hover:bg-red-50 text-slate-300 hover:text-red-400 rounded-lg transition-all"><Icon name="trash-2" size={12}/></button>
                    </div>
                  </div>
                </div>
              ))
          }
        </div>
      </div>
    );
  };

  // ═══════════════════════════ MESSAGES ════════════════════════
  const Messages=()=>{
    const [input,setInput]=useState('');
    const endRef=useRef(null);
    const selId=msgSid||students[0]?.id||null;
    const selSt=getSt(selId);
    const thread=messages[selId]||[];
    useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[thread]);
    const send=(text=input)=>{ if(!selId||!text.trim()) return; sendMsg(selId,text); setInput(''); };
    return(
      <div className="flex gap-5 h-[calc(100vh-180px)] min-h-[400px]">
        <div className="w-48 sm:w-56 flex-shrink-0 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex flex-col">
          <p className="px-4 py-3.5 text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100">학생 선택</p>
          <div className="overflow-y-auto flex-1">
            {students.length===0
              ?<p className="px-4 py-6 text-xs text-center text-slate-400">학생을 먼저 등록해주세요</p>
              :students.map(st=>{
                const th=messages[st.id]||[]; const c=col(st);
                return(
                  <button key={st.id} onClick={()=>setMsgSid(st.id)}
                    className={`w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-slate-50 border-b border-slate-50 transition-all ${selId===st.id?'bg-indigo-50':''}`}>
                    <Av name={st.name} col={c} sz="sm"/>
                    <div className="flex-1 min-w-0">
                      <p className={`text-sm font-semibold truncate ${selId===st.id?'text-indigo-700':'text-slate-700'}`}>{st.name}</p>
                      <p className="text-[10px] text-slate-400 truncate">{th.length>0?th[th.length-1].text:'메시지 없음'}</p>
                    </div>
                  </button>
                );
              })
            }
          </div>
        </div>

        <div className="flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex flex-col min-w-0">
          {!selSt
            ?<div className="flex-1 flex items-center justify-center text-slate-400 text-sm">학생을 선택하세요</div>
            :<>
              <div className="px-5 py-4 border-b border-slate-100 flex items-center gap-3 flex-shrink-0">
                <Av name={selSt.name} col={col(selSt)} sz="sm"/>
                <div><p className="font-bold text-sm">{selSt.name}</p><p className="text-xs text-slate-500">{selSt.subject}</p></div>
              </div>
              <div className="flex-1 overflow-y-auto p-4 space-y-3">
                {thread.length===0
                  ?<div className="flex items-center justify-center h-full text-slate-400 text-sm">첫 메시지를 보내보세요 😊</div>
                  :thread.map(msg=>(
                    <div key={msg.id} className={`flex ${msg.from==='tutor'?'justify-end':'justify-start'}`}>
                      <div className={`group max-w-xs flex flex-col ${msg.from==='tutor'?'items-end':'items-start'}`}>
                        <div className={`px-4 py-2.5 rounded-2xl text-sm font-medium leading-relaxed ${msg.from==='tutor'?'bg-indigo-600 text-white rounded-tr-sm':'bg-slate-100 text-slate-700 rounded-tl-sm'}`}>
                          {msg.text}
                        </div>
                        <p className="text-[10px] text-slate-400 mt-1 px-1 flex items-center gap-2">
                          {msg.time}
                          {msg.from==='tutor'&&<button onClick={()=>delMsg(selId,msg.id)} className="opacity-0 group-hover:opacity-100 hover:text-red-400 transition-all"><Icon name="trash-2" size={10}/></button>}
                        </p>
                      </div>
                    </div>
                  ))
                }
                <div ref={endRef}/>
              </div>
              <div className="px-4 py-2 border-t border-slate-100 flex gap-2 overflow-x-auto flex-shrink-0">
                {QUICK_MSGS.map((q,i)=>(
                  <button key={i} onClick={()=>send(q)}
                    className="px-3 py-1.5 bg-slate-100 hover:bg-indigo-50 hover:text-indigo-600 text-slate-600 rounded-full text-xs font-medium whitespace-nowrap transition-all flex-shrink-0">{q}</button>
                ))}
              </div>
              <div className="px-4 py-3 border-t border-slate-100 flex items-end gap-2 flex-shrink-0">
                <Inp value={input} onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
                  placeholder="메시지를 입력하세요..."
                  className="flex-1 w-auto"/>
                <button onClick={()=>send()} disabled={!input.trim()}
                  className="w-10 h-10 bg-indigo-600 disabled:bg-slate-200 text-white rounded-xl flex items-center justify-center transition-all hover:bg-indigo-700 active:scale-95">
                  <Icon name="send" size={15}/>
                </button>
              </div>
            </>
          }
        </div>
      </div>
    );
  };

  // ═══════════════════════════ MODALS ══════════════════════════
  const Modals=()=>(
    <>
      <Modal open={modal==='addStudent'} onClose={closeModal} title="학생 등록"
        footer={<PriBtn className="w-full justify-center" onClick={addStudent} disabled={!f.name?.trim()||!f.subject?.trim()}>저장하기</PriBtn>}>
        <Fld label="이름"><Inp value={f.name||''} onChange={e=>upd({name:e.target.value})} placeholder="예: 김민수" autoFocus/></Fld>
        <Fld label="과목"><Inp value={f.subject||''} onChange={e=>upd({subject:e.target.value})} placeholder="예: 고등 수학 (상)"/></Fld>
        <Fld label="클래스 (선택)">
          <Sel value={f.classId||''} onChange={e=>upd({classId:e.target.value})}>
            <option value="">클래스 없음</option>
            {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </Sel>
        </Fld>
      </Modal>

      <Modal open={modal==='editStudent'} onClose={closeModal} title="학생 정보 수정"
        footer={<PriBtn className="w-full justify-center" onClick={editStudent} disabled={!f.name?.trim()||!f.subject?.trim()}>저장하기</PriBtn>}>
        <Fld label="이름"><Inp value={f.name||''} onChange={e=>upd({name:e.target.value})} autoFocus/></Fld>
        <Fld label="과목"><Inp value={f.subject||''} onChange={e=>upd({subject:e.target.value})}/></Fld>
        <Fld label="클래스">
          <Sel value={f.classId||''} onChange={e=>upd({classId:e.target.value})}>
            <option value="">클래스 없음</option>
            {classes.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </Sel>
        </Fld>
      </Modal>

      <Modal open={modal==='addClass'} onClose={closeModal} title="클래스 추가"
        footer={<PriBtn className="w-full justify-center" onClick={addClass} disabled={!f.name?.trim()}>추가하기</PriBtn>}>
        <Fld label="클래스 이름"><Inp value={f.name||''} onChange={e=>upd({name:e.target.value})} placeholder="예: 중등반, 고등 수학반" autoFocus/></Fld>
      </Modal>

      <Modal open={modal==='addLesson'} onClose={closeModal} title="수업 추가"
        footer={<PriBtn className="w-full justify-center" onClick={addLesson} disabled={!f.studentId}>저장하기</PriBtn>}>
        <Fld label="학생">
          <Sel value={f.studentId||''} onChange={e=>upd({studentId:e.target.value})}>
            <option value="">학생 선택</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.subject})</option>)}
          </Sel>
        </Fld>
        <Fld label="날짜"><Inp type="date" value={f.date||selDate.format('YYYY-MM-DD')} onChange={e=>upd({date:e.target.value})}/></Fld>
        <div className="grid grid-cols-2 gap-3">
          <Fld label="시간"><Inp value={f.time||'16:00 - 17:30'} onChange={e=>upd({time:e.target.value})} placeholder="16:00 - 17:30"/></Fld>
          <Fld label="회차 (비우면 자동)"><Inp type="number" min="1" value={f.sessionCount||''} onChange={e=>upd({sessionCount:e.target.value})} placeholder="자동"/></Fld>
        </div>
        <Fld label="메모 (선택)"><Inp value={f.memo||''} onChange={e=>upd({memo:e.target.value})} placeholder="수업 메모"/></Fld>
      </Modal>

      <Modal open={modal==='editLesson'} onClose={closeModal} title="수업 수정"
        footer={<PriBtn className="w-full justify-center" onClick={editLesson}>저장하기</PriBtn>}>
        <Fld label="학생">
          <Sel value={f.studentId||''} onChange={e=>upd({studentId:e.target.value})}>
            <option value="">학생 선택</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.subject})</option>)}
          </Sel>
        </Fld>
        <Fld label="날짜"><Inp type="date" value={f.date||''} onChange={e=>upd({date:e.target.value})}/></Fld>
        <div className="grid grid-cols-2 gap-3">
          <Fld label="시간"><Inp value={f.time||''} onChange={e=>upd({time:e.target.value})}/></Fld>
          <Fld label="회차"><Inp type="number" min="1" value={f.sessionCount||''} onChange={e=>upd({sessionCount:e.target.value})}/></Fld>
        </div>
        <Fld label="메모"><Inp value={f.memo||''} onChange={e=>upd({memo:e.target.value})}/></Fld>
      </Modal>

      <Modal open={modal==='addHomework'} onClose={closeModal} title="숙제 추가"
        footer={<PriBtn className="w-full justify-center" onClick={addHomework} disabled={!f.studentId||!f.task?.trim()}>추가하기</PriBtn>}>
        <Fld label="학생">
          <Sel value={f.studentId||''} onChange={e=>upd({studentId:e.target.value})}>
            <option value="">학생 선택</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </Sel>
        </Fld>
        <Fld label="숙제 내용"><Txta value={f.task||''} onChange={e=>upd({task:e.target.value})} placeholder="예: 수학 익힘책 10-15p 풀기" rows={3}/></Fld>
        <Fld label="기한"><Inp type="date" value={f.dueDate||dayjs().format('YYYY-MM-DD')} onChange={e=>upd({dueDate:e.target.value})}/></Fld>
      </Modal>

      <Modal open={modal==='addProgress'} onClose={closeModal} title="진도 추가"
        footer={<PriBtn className="w-full justify-center" onClick={addProgress} disabled={!f.studentId||!f.unit?.trim()}>추가하기</PriBtn>}>
        <Fld label="학생">
          <Sel value={f.studentId||''} onChange={e=>upd({studentId:e.target.value})}>
            <option value="">학생 선택</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </Sel>
        </Fld>
        <Fld label="단원명"><Inp value={f.unit||''} onChange={e=>upd({unit:e.target.value})} placeholder="예: 1단원: 이차방정식"/></Fld>
        <Fld label="메모 (선택)"><Inp value={f.memo||''} onChange={e=>upd({memo:e.target.value})} placeholder="진도 메모"/></Fld>
        <Fld label="초기 상태">
          <div className="flex gap-2">
            {['미시작','진행중','완료'].map(s=>(
              <button key={s} onClick={()=>upd({status:s})}
                className={`flex-1 py-2 rounded-xl text-xs font-bold transition-all ${f.status===s?`${STAT_CFG[s].bg} ${STAT_CFG[s].text} ring-2 ring-offset-1 ring-indigo-400`:'bg-slate-100 text-slate-500'}`}>{s}</button>
            ))}
          </div>
        </Fld>
      </Modal>

      <Modal open={modal==='addTeacher'} onClose={closeModal} title="선생님 추가"
        footer={<PriBtn className="w-full justify-center" onClick={addTeacher} disabled={!f.name?.trim()}>추가하기</PriBtn>}>
        <Fld label="이름"><Inp value={f.name||''} onChange={e=>upd({name:e.target.value})} placeholder="예: 김선생님" autoFocus/></Fld>
        <Fld label="이모지">
          <div className="flex gap-2 flex-wrap">
            {T_EMOJIS.map(e=>(
              <button key={e} onClick={()=>upd({emoji:e})}
                className={`w-11 h-11 text-2xl rounded-xl transition-all ${f.emoji===e?'bg-indigo-100 ring-2 ring-indigo-400':'bg-slate-100 hover:bg-slate-200'}`}>{e}</button>
            ))}
          </div>
        </Fld>
      </Modal>

      <Modal open={modal==='shareHW'} onClose={closeModal} title="숙제 공유">
        {editTarget&&(
          <div className="text-center space-y-4">
            <div className="w-16 h-16 mx-auto bg-indigo-50 rounded-2xl flex items-center justify-center">
              <Icon name="share-2" size={28} className="text-indigo-500"/>
            </div>
            <div>
              <p className="font-bold text-slate-800">{editTarget.name} 학생 숙제</p>
              <p className="text-sm text-slate-500 mt-1">아래 링크를 학부모님께 공유하세요</p>
            </div>
            <div className="bg-slate-50 rounded-xl p-3 border border-slate-200 text-left">
              <p className="text-xs text-slate-500 break-all font-mono">{shareLink(editTarget.id)}</p>
            </div>
            <button onClick={()=>navigator.clipboard.writeText(shareLink(editTarget.id)).then(()=>showToast('링크 복사됨!'))}
              className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all">
              <Icon name="copy" size={15}/>링크 복사
            </button>
            <p className="text-[11px] text-slate-400">※ 숙제 데이터가 URL에 포함되어 어떤 기기에서도 열람 가능합니다</p>
          </div>
        )}
      </Modal>
    </>
  );

  // ═══════════════════════════ RENDER ══════════════════════════
  return(
    <div className="min-h-screen bg-slate-50">
      <Header/>
      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 pb-24 lg:pb-8">
        {tab==='dashboard'&&<Dashboard/>}
        {tab==='calendar' &&<Calendar/>}
        {tab==='students' &&<Students/>}
        {tab==='homework' &&<Homework/>}
        {tab==='progress' &&<Progress/>}
        {tab==='messages' &&<Messages/>}
      </main>
      <MobileNav/>
      <Modals/>

      {/* Toast notification */}
      {toast&&(
        <div className={`fixed bottom-24 lg:bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-2.5 px-5 py-3 rounded-2xl shadow-xl text-sm font-bold text-white pointer-events-none
          ${toast.type==='success'?'bg-emerald-500':'bg-red-500'}`}>
          <Icon name={toast.type==='success'?'check-circle':'alert-circle'} size={16} className="text-white"/>
          {toast.msg}
        </div>
      )}

      {/* Mobile save FAB */}
      <button onClick={saveAll}
        className="lg:hidden fixed bottom-[72px] right-4 z-40 w-12 h-12 bg-emerald-500 hover:bg-emerald-600 text-white rounded-full shadow-lg flex items-center justify-center transition-all active:scale-95">
        <Icon name="save" size={18}/>
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
